<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HealthBridge - Welcome</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container" style="max-width:520px; padding:40px 20px 60px;">

    <div style="text-align:center; margin-bottom:40px;">
      <div style="width:64px;height:64px;border-radius:18px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;font-weight:900;margin:0 auto 16px;">✚</div>
      <div style="font-size:2rem;font-weight:900;color:var(--primary);">HealthBridge</div>
      <div style="font-size:1.05rem;font-weight:600;color:var(--muted);margin-top:6px;">Your health, simplified.</div>
    </div>

    <div style="font-size:1.3rem;font-weight:900;color:var(--text);margin-bottom:20px;">Who are you? Choose your portal:</div>

    <div style="display:flex;flex-direction:column;gap:14px;">

      <div class="role-card-big primary-role" onclick="window.location.href='patient-login.html'">
        <div class="role-big-icon" style="background:#d0ede9;">👤</div>
        <div>
          <div class="role-big-title">I'm a Patient</div>
          <div class="role-big-desc">Manage medicines, book doctors, order pharmacy</div>
        </div>
        <div style="margin-left:auto;font-size:1.3rem;color:var(--primary);">→</div>
      </div>

      <div class="role-card-big" onclick="window.location.href='doctor-login.html'">
        <div class="role-big-icon" style="background:#e4eeff;">🩺</div>
        <div>
          <div class="role-big-title">I'm a Doctor</div>
          <div class="role-big-desc">Manage your schedule and appointments</div>
        </div>
        <div style="margin-left:auto;font-size:1.3rem;color:var(--muted);">→</div>
      </div>

      <div class="role-card-big" onclick="window.location.href='pharmacy-login.html'">
        <div class="role-big-icon" style="background:#fff0da;">🏪</div>
        <div>
          <div class="role-big-title">I'm a Pharmacy</div>
          <div class="role-big-desc">Manage inventory and incoming orders</div>
        </div>
        <div style="margin-left:auto;font-size:1.3rem;color:var(--muted);">→</div>
      </div>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
